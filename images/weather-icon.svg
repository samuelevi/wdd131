  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="2" stroke-linecap="round">
    <line x1="55" y1="15" x2="55" y2="5"/>
    <line x1="55" y1="55" x2="55" y2="65"/>
    <line x1="75" y1="35" x2="85" y2="35"/>
    <line x1="35" y1="35" x2="25" y2="35"/>
    <line x1="72" y1="18" x2="79" y2="11"/>
    <line x1="31" y1="59" x2="24" y2="66"/>
    <line x1="72" y1="52" x2="79" y2="59"/>
    <line x1="31" y1="18" x2="24" y2="11"/>
  </g>
  
  <!-- Rain drops -->
  <g fill="#4A90E2">
    <circle cx="35" cy="75" r="2"/>
